<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">

    <title>Mood Tracker</title>
</head>
<style>
@import url('https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&family=Fontdiner+Swanky&display=swap');
</style>
<body>
    <div class="container">
        <h1 id="greeting">Hello!!</h1>
        <h2>How Are You Feeling?</h2>

        <button class="moodButton" id="happy">(˶˃ ᵕ ˂˶) Happy!</button>
        <button class="moodButton" id="meh">(„• ֊ •„) Meh..</button>
        <button class="moodButton" id="upset">(｡•́︿•̀｡) Upset</button>    

        <p id="moodMessage"></p>
        <input type="text" id="moodInput" placeholder="Why are you feeling this way?">
        <button id="addEntry">Add Entry</button>

        <ul id="entryList"></ul>

        <button id="clearButton"> Clear All</button>

        <script src="script.js"></script>
</div>
</body>
</html>
